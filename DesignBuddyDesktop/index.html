<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Buddy Desktop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash-screen">
    <h1 id="splash-title">Design Buddy Desktop</h1>
  </div>

  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2 id="sidebar-title">Design Buddy Desktop</h2>
      <ul class="tabs">
        <!-- Tabs will be dynamically generated -->
      </ul>
      <div class="language-switcher">
        <label id="language-label" for="language-select">Language</label>
        <select id="language-select" aria-label="Language selector">
          <option value="en">English</option>
          <option value="fr">Français</option>
        </select>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="content">
      <!-- Tab content will be dynamically generated -->
    </main>
  </div>

    <script src="fingerSizes.js"></script>
    <script src="materialDensities.js"></script>
    <script src="contacts.js"></script>
    <script src="app.js"></script>
</body>

<footer id="footer-text">
  Presented by Ludo B.
</footer>

</html>
