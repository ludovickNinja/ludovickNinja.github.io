<div class="conversion-container">
  <p class="tab-description">
    <strong>Estimate the weight of the same design in a different gold karat.</strong><br>
    Enter the design's current weight and karat, choose a target karat, and the tool will calculate
    an estimated converted weight based on the density difference between the two alloys.
  </p>

  <div class="converter">
    <label for="known-material">Material of Known Weight:</label>
    <select id="known-material"></select>

    <label for="known-weight">Enter Known Weight (grams):</label>
    <input type="number" id="known-weight" placeholder="Enter weight">
  </div>
  <div class="converter">
    <label for="target-material">Material to Convert To:</label>
    <select id="target-material"></select>

    <label for="converted-weight">Converted Weight (grams):</label>
    <input type="text" id="converted-weight" readonly placeholder="Converted weight">
  </div>
</div>
